<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | AJH</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-primary: #00d4ff;
            --accent-secondary: #7b2cbf;
            --accent-tertiary: #ff006e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --gradient-1: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 50%, #ff006e 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated grid background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -2;
        }

        .bg-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(123, 44, 191, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 0, 110, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: bgGlow 20s ease-in-out infinite alternate;
        }

        @keyframes bgGlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: floatParticle 20s linear infinite;
            opacity: 0.5;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 404 content */
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .error-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: glitch 2s ease-in-out infinite;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-5px, 5px); }
            94% { transform: translate(5px, -5px); }
            96% { transform: translate(-5px, -5px); }
            98% { transform: translate(5px, 5px); }
        }

        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 6rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .error-description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.7;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--accent-primary);
        }

        .btn-outline:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-3px);
        }

        /* Stats glitch lines */
        .glitch-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .glitch-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-primary);
            opacity: 0;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { top: -2px; opacity: 0; }
            5% { opacity: 0.3; }
            95% { opacity: 0.3; }
            100% { top: 100%; opacity: 0; }
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .error-code { font-size: 4rem; letter-spacing: -3px; }
            .error-icon { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
            .error-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="glitch-lines">
        <div class="glitch-line" style="animation-delay: 0s;"></div>
        <div class="glitch-line" style="animation-delay: 2s;"></div>
    </div>

    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-bolt"></i>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-description">
            Looks like this page took a wrong turn somewhere along the way. 
            The digital highway doesn't have a detour for this one.
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="/#projects" class="btn btn-outline">
                <i class="fas fa-folder-open"></i> View Projects
            </a>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 AJ H. <a href="/">ajhs.github.io</a></p>
    </footer>

    <script>
        // Create floating particles
        const particleContainer = document.createElement('div');
        particleContainer.className = 'particles';
        document.body.appendChild(particleContainer);

        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (15 + Math.random() * 15) + 's';
            const size = 2 + Math.random() * 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            if (Math.random() > 0.6) particle.style.background = 'var(--accent-secondary)';
            else if (Math.random() > 0.5) particle.style.background = 'var(--accent-tertiary)';
            particleContainer.appendChild(particle);
        }
    </script>
</body>
</html>
