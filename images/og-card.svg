<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#ff006e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#00d4ff" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#7b2cbf" opacity="0.04"/>
  <circle cx="600" cy="315" r="300" fill="#ff006e" opacity="0.02"/>
  
  <!-- Brand icon -->
  <text x="600" y="140" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#accentGrad)" text-anchor="middle" filter="url(#glow)">⚡</text>
  
  <!-- Main title -->
  <text x="600" y="260" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ffffff" text-anchor="middle">AJ H</text>
  
  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="28" fill="#a0a0b0" text-anchor="middle">Full-Stack Developer • Daily Builder</text>
  
  <!-- Divider -->
  <rect x="400" y="360" width="400" height="3" fill="url(#accentGrad)" rx="2"/>
  
  <!-- Stats row -->
  <g transform="translate(150, 420)">
    <text x="150" y="30" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#00d4ff" text-anchor="middle">100K+</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="16" fill="#606070" text-anchor="middle">Games</text>
  </g>
  <g transform="translate(450, 420)">
    <text x="150" y="30" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#7b2cbf" text-anchor="middle">90+</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="16" fill="#606070" text-anchor="middle">Repos</text>
  </g>
  <g transform="translate(750, 420)">
    <text x="150" y="30" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#ff006e" text-anchor="middle">365</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="16" fill="#606070" text-anchor="middle">Days Building</text>
  </g>
  
  <!-- Location -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="20" fill="#606070" text-anchor="middle">📍 The Bronx, NY</text>
  
  <!-- URL -->
  <text x="600" y="600" font-family="monospace, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle">ajhs.github.io</text>
</svg>
